#
# Reasons for disabling specific checks:

# We want to avoid using CHECK_* macros and prefer explicit boolean expressions!
# cpplint would raise this warning on our code:
# "Consider using CHECK_EQ instead of CHECK(a == b)  [readability/check] [2]"
# "Consider using CHECK_GE instead of CHECK(a >= b)  [readability/check] [2]"
#
filter=-readability/check
