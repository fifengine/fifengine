# -----------------------------------------------------------------------------
# This workflow builds the Fifengine C++ library on Windows.
# -----------------------------------------------------------------------------
name: Build on Windows (C++ Library)

on:
  - push
  - pull_request
  # You can manually run this workflow.
  - workflow_dispatch

# improve CI concurrency by automatically cancelling outdated jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

# ---------------------------------------------------------------------------------------

  build-on-windows:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    # https://github.com/actions/runner-images#available-environments
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
        # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-VS2026-Readme.md
        - {
            job_name: "Win | VC18 | Shared | Release",
            os: windows-2025-vs2026,
            preset: vc18-x64-windows-rel,
            triplet: x64-windows,
            artifact-name: libfife-vc18-x64-windows
          }
        # disabled, because "Linker cannot open file 'python314_d.lib'"
        # - {
        #     job_name: "Win | VC18 | Shared | Debug",
        #     os: windows-2025-vs2026,
        #     preset: vc18-x64-windows-dbg,
        #     triplet: x64-windows,
        #     artifact-name: libfife-vc18-x64-windows-debug
        #   }
        - {
            job_name: "Win | VC18 | Shared | RDI",
            os: windows-2025-vs2026,
            preset: vc18-x64-windows-rdi,
            triplet: x64-windows,
            artifact-name: libfife-vc18-x64-windows-rdi
          }

    env:
      VCPKG_DISABLE_METRICS: 1
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed
      SOURCE_DIR:          ${{ github.workspace }}
      BUILD_DIR:           ${{ github.workspace }}\build
      INSTALL_DIR:         ${{ github.workspace }}\install
      DEPS_DIR:            ${{ github.workspace }}\out\fife-dependencies

    defaults:
      run:
        shell: cmd

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      # https://community.chocolatey.org/packages/ninja
      - name: 🔽 Install Ninja
        run: choco install ninja --no-progress

      # https://community.chocolatey.org/packages/cmake
      - name: 🔽 Install CMake
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --no-progress

      - name: Debug matrix.config.os
        run: |
          echo "matrix.config.os value is: ${{ matrix.config.os }}"

      # Redefine location to "c:\vcpkg"
      - name: 🔽 Define VCPKG_ROOT
        run: |
          set VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%
          echo VCPKG_ROOT=%VCPKG_ROOT%>>%GITHUB_ENV%

      # Reminder: This step requires that the CMakePresets for CI contain
      # "CMAKE_CXX_COMPILER_LAUNCHER": "sccache".
      - name: 🎯 Setup Build Cache
        uses: hendrikmuhs/ccache-action@v1.2.23 # https://github.com/hendrikmuhs/ccache-action
        with:
          variant: sccache
          key: build-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            build-${{ matrix.config.preset }}-${{ github.ref }}
            build-${{ matrix.config.preset }}

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          # https://github.com/microsoft/vcpkg/blob/master/docs/users/binarycaching.md#configuration
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}\packages
            ~\AppData\Local\vcpkg\archives\
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}
            cache-vcpkg-${{ matrix.config.preset }}

      - name: 🎯 Setup Dependencies Cache
        id: cache-deps
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}
          restore-keys: |
            cache-deps-${{ matrix.config.preset }}-${{ github.ref }}
            cache-deps-${{ matrix.config.preset }}

      - name: 🔽 1.1 Update VCPKG (latest TAG)
        run: |
          cd /d "%VCPKG_ROOT%"

          rem GitHub-hosted runner vcpkg can contain local edits; reset everything.
          git fetch origin --tags --force
          git checkout master
          git reset --hard origin/master
          git clean -fdx

          for /f "delims=" %%i in ('git tag --sort=-v:refname') do (
            set LATEST_VCPKG_TAG=%%i
            goto :tag_found
          )
          :tag_found
          if "%LATEST_VCPKG_TAG%"=="" (
            echo Failed to resolve latest vcpkg tag
            exit /b 1
          )

          git checkout %LATEST_VCPKG_TAG%

      - name: 🛠️ 1.2 VCPKG - Bootstrap and integrate with system
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          bootstrap-vcpkg.bat
          vcpkg integrate install

      - name: 📦 1.3 VCPKG - Install dependencies
        run: |
          vcpkg install --triplet ${{ matrix.config.triplet }} --x-install-root "%VCPKG_INSTALLED_DIR%"

      - name: 🧩 2.1 Configure non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake ^
            -S dependencies ^
            -B "%DEPS_DIR%\build" ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DFIFE_DEPENDENCIES_ROOT="%DEPS_DIR%" ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} ^
            -DVCPKG_INSTALLED_DIR="%VCPKG_INSTALLED_DIR%" ^
            -DFIFECHAN_BUILD_FROM_SOURCE=ON

      - name: 🏗️ 2.2 Build non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake --build "%DEPS_DIR%\build" --parallel

      # Notes:
      # - SWIG: the detection uses the CMake FindSWIG module, which looks for SWIG_EXECUTABLE and SWIG_DIR.
      #   It will find the pre-installed SWIG in C:/ProgramData/chocolatey/lib/swig/ first.
      #   We need to override it to use the one we fetched.
      #   If SWIG_EXECUTABLE is not set, the system one will be used (C:/ProgramData/chocolatey/lib/swig/)
      #   If SWIG_DIR is not set, SWIG_LIB will be the system one (C:/ProgramData/chocolatey/lib/swig/tools/install/swigwin-4.3.1/Lib)
      # - CMAKE_CXX_COMPILER_LAUNCHER=sccache must be set manually, can not be set via presets.
      #   As local developer might not have sccache installed, but on CI we want to use it for caching.
      #   sccache is only used for release builds, because it conflicts with PDB generation.
      - name: 🛠️ 3.1 Configure fifengine
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake ^
            --preset ${{ matrix.config.preset }} ^
            -B "%BUILD_DIR%" ^
            -DENABLE_FIFEGUI=ON ^
            -DBUILD_PYTHON_BINDINGS=OFF ^
            -DBUILD_LIBRARY=ON ^
            -DCMAKE_PREFIX_PATH="%DEPS_DIR%\install;%VCPKG_INSTALLED_DIR%\${{ matrix.config.triplet }}" ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} ^
            -DVCPKG_INSTALLED_DIR="%VCPKG_INSTALLED_DIR%" ^
            ${{ matrix.config.preset == 'vc18-x64-windows-rel' && '-DCMAKE_CXX_COMPILER_LAUNCHER=sccache' || '' }}

        #    -DSWIG_EXECUTABLE="%DEPS_DIR%\build-tools\swig\swig.exe" ^
        #    -DSWIG_DIR="%DEPS_DIR%\build-tools\swig\Lib"

      - name: 🙏 3.2 Build fifengine
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake --build ${{ env.BUILD_DIR }}

      - name: 📦 3.3 Install fifengine
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_DIR }}

      - name: ❔ CHECK important folders, to see if everything is present (after building)
        run: |
          dir ${{ env.BUILD_DIR }}
          dir ${{ env.INSTALL_DIR }}

      - name: 🔼 Upload build artifacts
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
          retention-days: 30
