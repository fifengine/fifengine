name: "C++ Quality"

on:
  - push
  - pull_request
  # You can manually run this workflow.
  - workflow_dispatch

# improve CI concurrency by automatically cancelling outdated jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

# ---------------------------------------------------------------------------------------

  clang-format:

# ---------------------------------------------------------------------------------------

    runs-on: ubuntu-latest

    steps:

      - name: 🤘 Checkout Code
        uses: actions/checkout@v6

      - name: 🔽 Install dos2unix
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix

      - name: 🔽 Install clang-format-20
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x ./llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-format-20
          rm llvm.sh

      - name: 🛠️ Apply formatting
        run: |
          chmod +x build-tools/format.sh
          ./build-tools/format.sh
        #continue-on-error: true

      - name: 🛠️ Check git difference
        run: |
          git status
          git diff
        #continue-on-error: true

# ---------------------------------------------------------------------------------------

  cpplint:

# ---------------------------------------------------------------------------------------

    runs-on: ubuntu-latest

    steps:

      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      - name: 🔽 Setup Python
        run: |
          sudo apt-get update
          sudo apt-get -y install python3 python3-pip python3-venv grep

      - name: 🔽 Setup Python Virtual Env
        run: |
          export VIRTUAL_ENV=/opt/venv
          python3 -m venv $VIRTUAL_ENV
          export PATH="$VIRTUAL_ENV/bin:$PATH"

      - name: 🔽 Install cpplint
        run: |
          pip install --prefer-binary --no-cache-dir cpplint

      - name: 🛠️ Run cpplint
        run: |
          cpplint --recursive src include tests examples

      - name: 🛠️ Identify places where 'reinterpret_cast' is used
        run: |
          grep -rniw --include=\*.{cpp,hpp} "reinterpret_cast" src include tests examples
        continue-on-error: true

# ---------------------------------------------------------------------------------------

  cppcheck:

# ---------------------------------------------------------------------------------------

    runs-on: ubuntu-latest

    steps:

      - name: 🤘 Checkout Code
        uses: actions/checkout@v6

      - name: 🔽 Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: 🛠️ Run cppcheck
        run: |
          echo "Cppcheck version: $(cppcheck --version)"
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++20 \
            --quiet \
            --inline-suppr \
            --error-exitcode=1 \
            src tests/core_tests
        #continue-on-error: true

# ---------------------------------------------------------------------------------------

  python-quality:

# ---------------------------------------------------------------------------------------

    runs-on: ubuntu-latest

    steps:

      - name: 🤘 Checkout Code
        uses: actions/checkout@v6

      - name: 🔽 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.15'

      - name: 🔽 Install Python QA tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy

      - name: 🛠️ Check formatting (black)
        run: |
          black --check src/python/fife tests/extension_tests tests/swig_tests run_tests.py
        #continue-on-error: true

      - name: 🛠️ Lint (ruff)
        run: |
          ruff check src/python/fife tests/extension_tests tests/swig_tests run_tests.py
        #continue-on-error: true

      - name: 🛠️ Type checking (mypy)
        run: |
          mypy src/python/fife
        #continue-on-error: true
