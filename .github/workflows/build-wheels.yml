# -----------------------------------------------------------------------------
# This workflow builds Python wheels for the Python bindings of Fifengine.
# -----------------------------------------------------------------------------
# This workflow uses cibuildwheel to run the full build pipeline:
#  1. Compile the C++ library
#  2. Generate the Python bindings using Swig
#  3. Package the result into Python wheel distributions
#
# The generated wheels are stored as workflow artifacts.
# Publishing to PyPI is handled by a separate workflow, triggered manually
# or automatically on version tags.
# -----------------------------------------------------------------------------
name: Build Fifengine (Python Wheels)

on:
  - push
  - pull_request
  # You can manually run this workflow.
  - workflow_dispatch
    # inputs:
    #   upload:
    #     description: 'Upload wheels to PyPI? (0: NO, 1: YES)'
    #     required: true
    #     default: '0'

# improve CI concurrency by automatically cancelling outdated jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

# ---------------------------------------------------------------------------------------

  build-wheels-windows:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
        # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
        # - {
        #     job_name: "Win | VC17 | Release",
        #     os: windows-2025,
        #     preset: vc17-x64-windows-rel,
        #     triplet: x64-windows,
        #     artifact-name: wheels-win-vc17
        #   }
        # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-VS2026-Readme.md
        - {
            job_name: "Win | VC18 | Release",
            os: windows-2025-vs2026,
            preset: vc18-x64-windows-rel,
            triplet: x64-windows,
            artifact-name: wheels-win-vc18
          }

    env:
      VCPKG_DISABLE_METRICS: 1
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed
      SOURCE_DIR:          ${{ github.workspace }}
      BUILD_DIR:           ${{ github.workspace }}\build
      DEPS_DIR:            ${{ github.workspace }}\out\fife-dependencies\${{ matrix.config.triplet }}

    defaults:
      run:
        shell: cmd

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      # https://community.chocolatey.org/packages/ninja
      - name: 🔽 Install Ninja
        run: choco install ninja --no-progress

      # https://community.chocolatey.org/packages/cmake
      - name: 🔽 Install CMake
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --no-progress

      # Default Location is "c:\vcpkg"
      - name: 🔽 Define VCPKG_ROOT
        shell: pwsh
        run: |
          $VCPKG_ROOT=$($env:VCPKG_INSTALLATION_ROOT)
          echo "VCPKG_ROOT=$($VCPKG_ROOT)" >> $env:GITHUB_ENV

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}\packages
            ~\AppData\Local\vcpkg\archives\
          key: cache-vcpkg-wheels-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cache-vcpkg-wheels-${{ matrix.config.preset }}-${{ github.ref }}-

      - name: 🎯 Setup UV Cache
        id: cache-uv
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\uv\cache
          key: uv-cache-wheels-${{ runner.os }}

      - name: 🎯 Setup Dependencies Cache
        id: cache-deps
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-wheels-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}
          restore-keys: |
            cache-deps-wheels-${{ matrix.config.preset }}-${{ github.ref }}-

      - name: 🔽 1.1 Update VCPKG (latest TAG)
        run: |
          cd /d "%VCPKG_ROOT%"

          rem GitHub-hosted runner vcpkg can contain local edits; reset everything.
          git fetch origin --tags --force
          git checkout master
          git reset --hard origin/master
          git clean -fdx

          for /f "delims=" %%i in ('git tag --sort=-v:refname') do (
            set LATEST_VCPKG_TAG=%%i
            goto :tag_found
          )
          :tag_found
          if "%LATEST_VCPKG_TAG%"=="" (
            echo Failed to resolve latest vcpkg tag
            exit /b 1
          )

          git checkout %LATEST_VCPKG_TAG%

      - name: 🛠️ 1.2 VCPKG - Bootstrap and integrate with system
        run: |
          bootstrap-vcpkg.bat
          vcpkg integrate install

      - name: 📦 1.3 VCPKG - Install dependencies
        #if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          vcpkg install --triplet ${{ matrix.config.triplet }} --x-install-root "%VCPKG_INSTALLED_DIR%"

      - name: 🧩 2.1 Configure non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake ^
            -S dependencies ^
            -B "%DEPS_DIR%\build" ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} ^
            -DVCPKG_INSTALLED_DIR="%VCPKG_INSTALLED_DIR%"

      - name: 🏗️ 2.2 Install non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake --build "%DEPS_DIR%\build" --parallel

      - name: ❔ CHECK important folders, to see if everything is present (after building)
        run: |
          dir /S "%DEPS_DIR%\install\bin"
          dir /S "%VCPKG_INSTALLED_DIR%\${{ matrix.config.triplet }}\bin"
          dir /S "%VCPKG_INSTALLED_DIR%\${{ matrix.config.triplet }}\debug\bin"

      - name: 💾 Save Dependencies cache
        if: ${{ always() && !cancelled() && steps.cache-deps.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-wheels-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}

      # TODO do we need threaded version of Python? "3.xxt"?
      # For the available "python-version"s of this action see:
      # https://raw.githubusercontent.com/actions/python-versions/main/versions-manifest.json
      - name: 🔽 3.1 Setup Python
        uses: actions/setup-python@v6 # https://github.com/actions/setup-python
        with:
          python-version: "3.14.3" # "3.15.0-alpha.7"

      - name: 🛠️ 3.2 Install wheel building tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          python -m pip install cibuildwheel

      - name: 🔧 3.3 Normalize paths for cibuildwheel
        shell: pwsh
        run: |
          # Overwrite existing env vars with forward-slash versions
          $env:VCPKG_ROOT            = $env:VCPKG_ROOT -replace '\\', '/'
          $env:VCPKG_INSTALLED_DIR   = $env:VCPKG_INSTALLED_DIR -replace '\\', '/'
          $env:DEPS_DIR              = $env:DEPS_DIR -replace '\\', '/'
          $env:BUILD_DIR             = $env:BUILD_DIR -replace '\\', '/'
          # Export to GitHub ENV
          echo "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "VCPKG_INSTALLED_DIR=$env:VCPKG_INSTALLED_DIR" >> $env:GITHUB_ENV
          echo "DEPS_DIR=$env:DEPS_DIR" >> $env:GITHUB_ENV
          echo "BUILD_DIR=$env:BUILD_DIR" >> $env:GITHUB_ENV
          Write-Host "✅ Paths normalized (overwritten) for remaining steps"

      # For Python versions see: https://devguide.python.org/versions/#versions
      # We build wheels for the current Python version and one preceding minor version.
      # cmake.define.ENABLE_FIFEGUI=ON
      # cmake.define.BUILD_PYTHON_BINDINGS=ON
      # cmake.define.BUILD_LIBRARY=ON
      # cmake.define.VCPKG_MANIFEST_MODE=OFF
      - name: 🛠️ 3.4 Build wheels
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-win_amd64 cp314-win_amd64"
          CIBW_ENVIRONMENT: >
            VCPKG_ROOT=${{ env.VCPKG_ROOT }}
            VCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }}
            VCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}
            DEPS_DIR=${{ env.DEPS_DIR }}
            CMAKE_BUILD_PARALLEL_LEVEL=4
          CIBW_CONFIG_SETTINGS: |
            cmake.define.CMAKE_BUILD_TYPE=Release
            cmake.define.CMAKE_PREFIX_PATH=${{ env.DEPS_DIR }}/install;${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}
            cmake.define.CMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
            cmake.define.VCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }}
            cmake.define.VCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            set PATH=%DEPS_DIR%\install\bin;%VCPKG_INSTALLED_DIR%\${{ matrix.config.triplet }}\bin;%PATH% &&
            python -m delvewheel repair {wheel} --wheel-dir {dest_dir} --ignore-existing

      - name: 🛠️ 3.5 Verify wheels
        shell: bash
        run: |
          ls wheelhouse/*.whl
          uv tool run --from check-wheel-contents check-wheel-contents --config pyproject.toml wheelhouse/*.whl

      - name: 🚬 Smoke Test (Basic Import)
        shell: bash
        run: |
          set -euo pipefail

          pip install --quiet uv

          get_py_version_from_wheel_filename() {
            case "$1" in
              *cp313*) echo "3.13" ;;
              *cp314*) echo "3.14" ;;
              *)
                echo "❌ Unknown Python tag in $1" >&2
                exit 1
                ;;
            esac
          }

          for whl in wheelhouse/*.whl; do
            base="$(basename "$whl")"
            py_version="$(get_py_version_from_wheel_filename "$base")"
            name="${base%.whl}"
            venv_dir=".venv-$name"

            echo "== Testing the $base wheel with Python $py_version"

            echo "1. Create isolated virtual environment..."
            uv venv --python "$py_version" "$venv_dir"

            echo "2. Install the wheel..."
            uv pip install --python "$venv_dir" "$whl"

            echo "3. Running basic import test..."
            if [[ -f "$venv_dir/Scripts/python.exe" ]]; then
              py="$venv_dir/Scripts/python.exe"
            else
              py="$venv_dir/bin/python"
            fi
            "$py" -c "import fife; print('OK: $name (py$py_version) imported successfully')"

            rm -rf "$venv_dir"
          done

      - uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: wheelhouse/*.whl


# ---------------------------------------------------------------------------------------

  build-wheels-linux:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    runs-on: ubuntu-latest
    container: ghcr.io/jakoch/cpp-devbox:${{ matrix.config.image_version }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              job_name: "Linux | Clang22 | Wheel + Tests",
              image_version: "trixie-with-vulkansdk-latest",
              preset: "clang22-x64-linux-rel",
              triplet: x64-linux,
              artifact-name: "wheels-linux-clang22"
            }

    env:
      VCPKG_DISABLE_METRICS: 1
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      VCPKG_FEATURE_FLAGS: manifests,versions,binarycaching,registries
      VCPKG_ROOT: /opt/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      SOURCE_DIR: ${{ github.workspace }}
      DEPS_DIR: ${{ github.workspace }}/out/fife-dependencies/${{ matrix.config.triplet }}

    defaults:
      run:
        shell: bash

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      - name: ℹ Show Tool Versions
        run: |
          cmake --version
          ninja --version
          python3 --version

      - name: 🔽 Install required system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake libtool \
            build-essential git make \
            pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
            libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev \
            libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev libxft-dev \
            libglu1-mesa-dev xvfb libgl1-mesa-dri mesa-utils python3-dev

      - name: ✏ Define Build Paths
        run: |
          echo "BUILD_DIR=out/build/${{ matrix.config.preset }}" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=out/install/${{ matrix.config.preset }}" >> "$GITHUB_ENV"

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg-linux-wheels
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}/packages
            ~/.cache/vcpkg/archives
          key: cache-vcpkg-linux-wheels-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cache-vcpkg-linux-wheels-${{ matrix.config.preset }}-${{ github.ref }}

      - name: 🎯 Setup UV Cache
        id: cache-uv-linux-wheels
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-cache-wheels-${{ runner.os }}

      - name: 🎯 Setup Dependencies Cache
        id: cache-deps-linux-wheels
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-linux-wheels-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}
          restore-keys: |
            cache-deps-linux-wheels-${{ matrix.config.preset }}-${{ github.ref }}

      - name: 🔽 1.1 Update VCPKG (latest TAG)
        run: |
          cd ${{ env.VCPKG_ROOT }}
          git fetch origin --tags --force
          git checkout master
          git reset --hard origin/master
          git clean -fdx
          LATEST_VCPKG_TAG="$(git tag --sort=-v:refname | head -n 1)"
          git checkout "$LATEST_VCPKG_TAG"

      - name: 🛠️ 1.2 Setup VCPKG
        run: |
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh"
          "${VCPKG_ROOT}/vcpkg" integrate install

      - name: 📦 1.3 Install VCPKG dependencies
        #if: steps.cache-vcpkg-linux-wheels.outputs.cache-hit != 'true'
        run: |
          "${VCPKG_ROOT}/vcpkg" install --triplet "${{ matrix.config.triplet }}" --x-install-root="${{ env.VCPKG_INSTALLED_DIR }}"

      - name: 🧩 2.1 Configure non-vcpkg dependencies
        if: steps.cache-deps-linux-wheels.outputs.cache-hit != 'true'
        run: |
          cmake \
            -S dependencies \
            -B ${{ env.DEPS_DIR }}/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}

      - name: 🏗️ 2.2 Build non-vcpkg dependencies
        if: steps.cache-deps-linux-wheels.outputs.cache-hit != 'true'
        run: |
          cmake --build ${{ env.DEPS_DIR }}/build --parallel

      - name: 💾 Save Dependencies cache
        if: ${{ always() && !cancelled() && steps.cache-deps-linux-wheels.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-linux-wheels-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}

      - name: 🎯 Setup Build Directory Cache
        id: cache-build-dir-linux-wheels
        uses: actions/cache@v5
        with:
          path: build
          key: build-dir-linux-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            build-dir-linux-${{ github.ref }}-

      - name: 🛠️ 3.1 Show uv version
        run: |
          uv --version

      - name: 🛠️ 3.2 Build Linux wheel
        env:
          SKBUILD_BUILD_DIR: build/{wheel_tag}
          CMAKE_ARGS: >
            -DENABLE_FIFEGUI=ON
            -DBUILD_PYTHON_BINDINGS=ON
            -DBUILD_LIBRARY=ON
            -DVCPKG_MANIFEST_MODE=OFF
            -DCMAKE_PREFIX_PATH=${{ env.DEPS_DIR }}/install;${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }}
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}
        run: |
          uv build --wheel --out-dir wheelhouse

      - name: 🛠️ 3.3 Verify wheels
        run: |
          ls wheelhouse/*.whl
          uv tool run --from check-wheel-contents check-wheel-contents --config pyproject.toml wheelhouse/*.whl

      - name: 🐍 Prepare wheel test environment
        run: |
          set -euo pipefail
          uv venv --python /usr/bin/python3 .venv-wheeltest
          uv pip install --python .venv-wheeltest $(ls wheelhouse/*.whl | head -n 1) pytest pytest-timeout

      - name: 🚬 Smoke Test (installed wheel)
        env:
          LD_LIBRARY_PATH: >
            ${{ env.DEPS_DIR }}/install/lib:
            ${{ env.VCPKG_INSTALLED_DIR }}/x64-linux/lib
        run: |
          set -euo pipefail
          .venv-wheeltest/bin/python -c "import fife; from fife import fifechan; print('wheel import OK:', hasattr(fifechan, 'Window'))"

      - name: 🧪 Python Tests ➔ extension_tests (wheel)
        env:
          SDL_VIDEODRIVER: x11
          SDL_AUDIODRIVER: dummy
          LIBGL_ALWAYS_SOFTWARE: 1
          GALLIUM_DRIVER: llvmpipe
          MESA_GL_VERSION_OVERRIDE: 3.3
          LD_LIBRARY_PATH: ${{ env.DEPS_DIR }}/install/lib:${{ env.VCPKG_INSTALLED_DIR }}/x64-linux/lib
        run: |
          set -euo pipefail
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x1024x24 +extension GLX +render -noreset" \
            .venv-wheeltest/bin/python -m pytest tests/extension_tests/ -v \
            --timeout=120 --maxfail=10

      - name: 🧪 Python Tests ➔ swig_tests (wheel)
        env:
          SDL_VIDEODRIVER: x11
          SDL_AUDIODRIVER: dummy
          LIBGL_ALWAYS_SOFTWARE: 1
          GALLIUM_DRIVER: llvmpipe
          MESA_GL_VERSION_OVERRIDE: 3.3
          LD_LIBRARY_PATH: ${{ env.DEPS_DIR }}/install/lib:${{ env.VCPKG_INSTALLED_DIR }}/x64-linux/lib
        run: |
          set -euo pipefail
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x1024x24 +extension GLX +render -noreset" \
            .venv-wheeltest/bin/python -m pytest tests/swig_tests/ -v \
            --timeout=120 --maxfail=10

      - name: 🔼 Upload Linux wheel artifacts
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: wheelhouse/*.whl


