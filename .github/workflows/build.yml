name: Build fifengine

on:
  push:
    #branches: [ master, main, resurge ]
  pull_request:
    #branches: [ master, main ]
  workflow_dispatch:

# Improve CI concurrency by automatically cancelling outdated jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

# ---------------------------------------------------------------------------------------

  build-on-linux:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    # https://github.com/actions/runner-images#available-environments
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
        # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
        - {
            job_name: "Linux, Clang 16, Release",
            os: ubuntu-24.04,
            preset: clang16-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-linux-clang16-x64
          }
        - {
            job_name: "Linux, GCC 14, Release",
            os: ubuntu-24.04,
            preset: gcc14-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-linux-gcc14-x64
          }

    env:
      # VCPKG_ROOT is used by SetupVcpkg to automatically load the toolchain.
      VCPKG_ROOT: /usr/local/share/vcpkg
      VCPKG_DISABLE_METRICS: 1
      SOURCE_DIR:  ${{ github.workspace }}
      BUILD_DIR:   ${{ github.workspace }}/build
      INSTALL_DIR: ${{ github.workspace }}/install

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      - name: 🔽 Update Build Environment
        run: |
          sudo apt update -qq
          sudo apt install -y libglu1-mesa-dev autoconf libtool python3-jinja2 autoconf-archive automake libxmu-dev libxi-dev libgl-dev
          echo -e "libxcrypt depends on ltdl development files from the system package manager:"
          sudo apt install -y libltdl-dev

      # Reminder: This step requires that the CMakePresets for CI contain
      # "CMAKE_CXX_COMPILER_LAUNCHER": "sccache".
      - name: 🎯 Setup Build Cache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: build-${{ matrix.config.preset }}-${{ github.ref }}
          restore-keys: |
            build-${{ matrix.config.preset }}-${{ github.ref }}
            build-${{ matrix.config.preset }}

      - name: 🎯 Cache VCPKG
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          # https://github.com/microsoft/vcpkg/blob/master/docs/users/binarycaching.md#configuration
          path: /home/runner/.cache/vcpkg/archives/
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}
          restore-keys: |
            cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}
            cache-vcpkg-${{ matrix.config.preset }}

      - name: 🔽 1/4 Update VCPKG
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd ${{ env.VCPKG_ROOT }}
          git reset --hard
          git pull --quiet
          ./bootstrap-vcpkg.sh
          test -x "${{ env.VCPKG_ROOT }}/vcpkg"
          test -f "${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          echo "VCPKG_ROOT=${{ env.VCPKG_ROOT }}" >> $GITHUB_ENV
          ls -lahr "${{ env.VCPKG_ROOT }}/installed/${{ matrix.config.triplet }}/"

      - name: 2/4 📦 Install VCPKG dependencies
        run: |
          set -euo pipefail
          "${VCPKG_ROOT}/vcpkg" install --triplet "${{ matrix.config.triplet }}"

      - name: 3/4 🧩 Configure non-vcpkg dependencies
        run: |
          cmake \
            -S dependencies \
            -B ${{ env.BUILD_DIR }}/dependencies \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ env.BUILD_DIR }}/dependencies/install \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_ROOT }}/installed \
            -DDEPENDENCY_CMAKE_PREFIX_PATH=${{ env.VCPKG_ROOT }}/installed/${{ matrix.config.triplet }} \
            -DVCPKG_MANIFEST_MODE=OFF

      - name: 3/4 🏗️ Build non-vcpkg dependencies
        run: |
          cmake --build ${{ env.BUILD_DIR }}/dependencies --parallel

      - name: 4/4 🛠️ Configure fifengine
        run: |
          cmake \
            --preset ${{ matrix.config.preset }} \
            -B ${{ env.BUILD_DIR }} \
            -Dfifechan=ON \
            -Dbuild-python=ON \
            -Dbuild-library=ON \
            -DVCPKG_MANIFEST_MODE=OFF \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_ROOT }}/installed \
            "-DCMAKE_PREFIX_PATH=${{ env.BUILD_DIR }}/dependencies/install;${{ env.VCPKG_ROOT }}/installed/${{ matrix.config.triplet }}"

      - name: 4/4 🙏 Build fifengine
        run: cmake --build ${{ env.BUILD_DIR }}

      - name: 4/4 📦 Install fifengine
        run: cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_DIR }}

      - name: ❔ CHECK important folders, to see if everything is present (after building)
        run: |
          ls -lahr ${{ env.BUILD_DIR }}
          ls -lahr ${{ env.INSTALL_DIR }}

      - name: 🔼 Upload build artifacts
        uses: actions/upload-artifact@v6 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
          retention-days: 30

# ---------------------------------------------------------------------------------------

  build-on-windows:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    # https://github.com/actions/runner-images#available-environments
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
        # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
        - {
            job_name: "Windows, VC17, Release",
            os: windows-2025,
            preset: vc17-x64-windows-rel,
            triplet: x64-windows,
            artifact-name: libfife-windows-x64
          }

    env:
      VCPKG_DISABLE_METRICS: 1
      SOURCE_DIR:  ${{ github.workspace }}
      BUILD_DIR:   ${{ github.workspace }}\build
      INSTALL_DIR: ${{ github.workspace }}\install

    defaults:
      run:
        shell: cmd

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      # https://community.chocolatey.org/packages/ninja
      - name: 🔽 Install Ninja
        run: choco install ninja --no-progress

      # https://community.chocolatey.org/packages/cmake
      - name: 🔽 Install CMake
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --apply-install-arguments-to-dependencies --no-progress

      # WARNING
      # ENV VCPKG_ROOT is redefined by this action
      # and set to "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\vcpkg"
      # instead of "c:\vcpkg", which is important for the pre-installed VCPKG on GHA.
      - name: 🛠️ Setup Visual Studio Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # Default Location is "c:\vcpkg"
      - name: 🔽 Define VCPKG_ROOT
        shell: pwsh
        run: |
          $VCPKG_ROOT=$($env:VCPKG_INSTALLATION_ROOT)
          echo "VCPKG_ROOT=$($VCPKG_ROOT)" >> $env:GITHUB_ENV

      # Reminder: This step requires that the CMakePresets for CI contain
      # "CMAKE_CXX_COMPILER_LAUNCHER": "sccache".
      - name: 🎯 Setup Build Cache
        uses: hendrikmuhs/ccache-action@v1
        with:
          variant: sccache
          key: build-${{ matrix.config.preset }}-${{ github.ref }}
          restore-keys: |
            build-${{ matrix.config.preset }}-${{ github.ref }}
            build-${{ matrix.config.preset }}

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          # https://github.com/microsoft/vcpkg/blob/master/docs/users/binarycaching.md#configuration
          path: |
            ${{ env.VCPKG_ROOT }}\packages
            ~\AppData\Local\vcpkg\archives\
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}
          restore-keys: |
            cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}
            cache-vcpkg-${{ matrix.config.preset }}

      # Default Locations (env var VCPKG_INSTALLATION_ROOT):
      # Windows: "c:\vcpkg"
      # Linux: /usr/local/share/vcpkg
      - name: 🔽 Update VCPKG to latest TAG
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ env.VCPKG_ROOT }}"
          git fetch --tags
          LATEST_VCPKG_TAG=$(git describe --tags --abbrev=0)
          git checkout $LATEST_VCPKG_TAG

      - name: 🔽 Bootstrap + Integrate VCPKG
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          bootstrap-vcpkg.bat
          vcpkg integrate

      - name: 1/4 🔧 Prepare VCPKG (preinstalled)
        run: |
          if not exist "%VCPKG_ROOT%\vcpkg.exe" exit /b 1
          if not exist "%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" exit /b 1
          echo VCPKG_ROOT=%VCPKG_ROOT%

      - name: 2/4 📦 Install VCPKG dependencies
        run: |
          "%VCPKG_ROOT%\vcpkg.exe" install --triplet ${{ matrix.config.triplet }}

      - name: 3/4 🧩 Configure non-vcpkg dependencies
        run: |
          cmake ^
            -S dependencies ^
            -B "%BUILD_DIR%\dependencies" ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_INSTALL_PREFIX="%BUILD_DIR%\dependencies\install" ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} ^
            -DVCPKG_INSTALLED_DIR="%VCPKG_ROOT%\installed" ^
            -DDEPENDENCY_CMAKE_PREFIX_PATH="%VCPKG_ROOT%\installed\${{ matrix.config.triplet }}" ^
            -DVCPKG_MANIFEST_MODE=OFF

      - name: 3/4 🏗️ Build non-vcpkg dependencies
        run: |
          cmake --build "%BUILD_DIR%\dependencies" --parallel

      - name: 4/4 🛠️ Configure fifengine
        run: |
          cmake ^
            --preset ${{ matrix.config.preset }} ^
            -B "%BUILD_DIR%" ^
            -Dfifechan=ON ^
            -Dbuild-python=ON ^
            -Dbuild-library=ON ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} ^
            -DVCPKG_INSTALLED_DIR="%VCPKG_ROOT%\installed" ^
            "-DCMAKE_PREFIX_PATH=%BUILD_DIR%\dependencies\install;%VCPKG_ROOT%\installed\${{ matrix.config.triplet }}"

      - name: 4/4 🙏 Build fifengine
        run: cmake --build ${{ env.BUILD_DIR }}

      - name: 4/4 📦 Install fifengine
        run: cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_DIR }}

      - name: ❔ CHECK important folders, to see if everything is present (after building)
        run: |
          ls ${{ env.BUILD_DIR }}
          ls ${{ env.INSTALL_DIR }}

      - name: 🔼 Upload build artifacts
        uses: actions/upload-artifact@v6 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
          retention-days: 30
