name: Build fifengine

on:
  push:
    #branches: [ master, main, resurge ]
  pull_request:
    #branches: [ master, main ]
  workflow_dispatch:

# Improve CI concurrency by automatically cancelling outdated jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

# ---------------------------------------------------------------------------------------

  build-on-linux:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    # https://github.com/actions/runner-images#available-environments
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
        # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
        - {
            job_name: "Linux | Clang 16 | Release",
            os: ubuntu-24.04,
            preset: clang16-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-clang16-x64-linux
          }
        - {
            job_name: "Linux | Clang 18 | Release",
            os: ubuntu-24.04,
            preset: clang18-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-clang18-x64-linux
          }
        - {
            job_name: "Linux | GCC 14 | Release",
            os: ubuntu-24.04,
            preset: gcc14-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-gcc14-x64-linux
          }

    env:
      # VCPKG_ROOT is used by SetupVcpkg to automatically load the toolchain.
      VCPKG_ROOT: /usr/local/share/vcpkg
      VCPKG_DISABLE_METRICS: 1
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      SOURCE_DIR:  ${{ github.workspace }}
      BUILD_DIR:   ${{ github.workspace }}/build
      INSTALL_DIR: ${{ github.workspace }}/install
      DEPS_DIR:    ${{ github.workspace }}/out/fife-dependencies

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      - name: 🔽 Update Build Environment
        run: |
          sudo apt update -qq
          sudo apt install -y libglu1-mesa-dev autoconf libtool python3-jinja2 autoconf-archive automake libxmu-dev libxi-dev libgl-dev
          echo -e "libxcrypt depends on ltdl development files from the system package manager:"
          sudo apt install -y libltdl-dev

      # Reminder: This step requires that the CMakePresets for CI contain
      # "CMAKE_CXX_COMPILER_LAUNCHER": "sccache".
      - name: 🎯 Setup Build Cache
        uses: hendrikmuhs/ccache-action@v1.2.21 # https://github.com/hendrikmuhs/ccache-action
        with:
          key: build-${{ matrix.config.preset }}-${{ github.ref }}
          restore-keys: |
            build-${{ matrix.config.preset }}-${{ github.ref }}
            build-${{ matrix.config.preset }}

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          # https://github.com/microsoft/vcpkg/blob/master/docs/users/binarycaching.md#configuration
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}/packages
            /home/runner/.cache/vcpkg/archives/
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-
            cache-vcpkg-${{ matrix.config.preset }}-

      - name: 🎯 Setup Dependencies Cache
        id: cache-deps
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}
          restore-keys: |
            cache-deps-${{ matrix.config.preset }}-${{ github.ref }}-
            cache-deps-${{ matrix.config.preset }}-

      - name: 🔽 1/4 Setup VCPKG
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd ${{ env.VCPKG_ROOT }}
          git reset --hard
          git pull --quiet
          ./bootstrap-vcpkg.sh

      - name: 2/4 📦 Install VCPKG dependencies
        run: |
          set -euo pipefail
          "${{ env.VCPKG_ROOT }}/vcpkg" install --triplet "${{ matrix.config.triplet }}" --x-install-root="${{ env.VCPKG_INSTALLED_DIR }}"
          ls -lahr "${{ env.VCPKG_ROOT }}" || true
          ls -lahr "${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}/" || true

      # Force a save of the VCPKG packages, until the workflow goes fully green.
      - name: 💾 Save VCPKG cache
        if: ${{ always() && !cancelled() && steps.cache-vcpkg.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}/packages
            /home/runner/.cache/vcpkg/archives/
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}

      - name: 3/4 🧩 Configure non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake \
            -S dependencies \
            -B ${{ env.DEPS_DIR }}/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFIFE_DEPENDENCIES_ROOT=${{ env.DEPS_DIR }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}

      - name: 3/4 🏗️ Build non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake --build ${{ env.DEPS_DIR }}/build --parallel

      - name: 4/4 🛠️ Configure fifengine
        run: |
          cmake \
            --preset ${{ matrix.config.preset }} \
            -B ${{ env.BUILD_DIR }} \
            -Dfifechan=ON \
            -Dbuild-python=ON \
            -Dbuild-library=ON \
            -DVCPKG_MANIFEST_MODE=OFF \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }} \
            -DCMAKE_PREFIX_PATH="${{ env.DEPS_DIR }}/install;${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}"

      - name: 4/4 🙏 Build fifengine
        run: cmake --build ${{ env.BUILD_DIR }}

      - name: 4/4 📦 Install fifengine
        run: cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_DIR }}

      - name: ❔ CHECK important folders, to see if everything is present (after building)
        run: |
          ls -lahr ${{ env.BUILD_DIR }}
          ls -lahr ${{ env.INSTALL_DIR }}

      - name: 🔼 Upload build artifacts
        uses: actions/upload-artifact@v6 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
          retention-days: 30

# ---------------------------------------------------------------------------------------

  build-on-windows:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    # https://github.com/actions/runner-images#available-environments
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
        # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
        - {
            job_name: "Win | VC17 | Release",
            os: windows-2025,
            preset: vc17-x64-windows-rel,
            triplet: x64-windows,
            artifact-name: libfife-vc17-x64-windows
          }
        # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-VS2026-Readme.md
        - {
            job_name: "Win | VC18 | Shared | Release",
            os: windows-2025-vs2026,
            preset: vc18-x64-windows-rel,
            triplet: x64-windows,
            artifact-name: libfife-vc18-x64-windows
          }
        # disabled, because "Linker cannot open file 'python314_d.lib'"
        # - {
        #     job_name: "Win | VC18 | Shared | Debug",
        #     os: windows-2025-vs2026,
        #     preset: vc18-x64-windows-dbg,
        #     triplet: x64-windows,
        #     artifact-name: libfife-vc18-x64-windows-debug
        #   }
        - {
            job_name: "Win | VC18 | Shared | RelWithDebInfo",
            os: windows-2025-vs2026,
            preset: vc18-x64-windows-rdi,
            triplet: x64-windows,
            artifact-name: libfife-vc18-x64-windows-rdi
          }

    env:
      VCPKG_DISABLE_METRICS: 1
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed
      SOURCE_DIR:          ${{ github.workspace }}
      BUILD_DIR:           ${{ github.workspace }}\build
      INSTALL_DIR:         ${{ github.workspace }}\install
      DEPS_DIR:            ${{ github.workspace }}\out\fife-dependencies

    defaults:
      run:
        shell: cmd

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      # https://community.chocolatey.org/packages/ninja
      - name: 🔽 Install Ninja
        run: choco install ninja --no-progress

      # https://community.chocolatey.org/packages/cmake
      - name: 🔽 Install CMake
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --apply-install-arguments-to-dependencies --no-progress

      # - name: 🛠️ Setup Visual Studio Developer Command Prompt
      #   if: matrix.config.os == 'windows-2025'
      #   run: |
      #     call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
      #     cl.exe

      # - name: 🛠️ Setup Visual Studio Developer Command Prompt
      #   if: matrix.config.os == 'windows-2025-vs2026'
      #   run: |
      #     call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
      #     cl.exe

      # WARNING
      # ENV VCPKG_ROOT is redefined by this action
      # and set to "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\vcpkg"
      # instead of "c:\vcpkg", which is important for the pre-installed VCPKG on GHA.
      - name: 🛠️ Setup Visual Studio Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # Default Location is "c:\vcpkg"
      - name: 🔽 Define VCPKG_ROOT
        shell: pwsh
        run: |
          $VCPKG_ROOT=$($env:VCPKG_INSTALLATION_ROOT)
          echo "VCPKG_ROOT=$($VCPKG_ROOT)" >> $env:GITHUB_ENV

      # Reminder: This step requires that the CMakePresets for CI contain
      # "CMAKE_CXX_COMPILER_LAUNCHER": "sccache".
      - name: 🎯 Setup Build Cache
        uses: hendrikmuhs/ccache-action@v1.2.21 # https://github.com/hendrikmuhs/ccache-action
        with:
          variant: sccache
          key: build-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            build-${{ matrix.config.preset }}-${{ github.ref }}
            build-${{ matrix.config.preset }}

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          # https://github.com/microsoft/vcpkg/blob/master/docs/users/binarycaching.md#configuration
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}\packages
            ~\AppData\Local\vcpkg\archives\
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-
            cache-vcpkg-${{ matrix.config.preset }}-

      - name: 🎯 Setup Dependencies Cache
        id: cache-deps
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}
          restore-keys: |
            cache-deps-${{ matrix.config.preset }}-${{ github.ref }}-
            cache-deps-${{ matrix.config.preset }}-

      # Default Locations (env var VCPKG_INSTALLATION_ROOT):
      # Windows: "c:\vcpkg"
      # Linux: /usr/local/share/vcpkg
      - name: 🔽 1/4 Setup VCPKG
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ env.VCPKG_ROOT }}"
          echo "[VCPKG] Updating registry..."
          git fetch --tags
          LATEST_VCPKG_TAG=$(git describe --tags --abbrev=0)
          git checkout $LATEST_VCPKG_TAG
          echo "[VCPKG] Bootstrapping..."
          bootstrap-vcpkg.bat
          echo "[VCPKG] Integrating with the system..."
          vcpkg integrate install

      - name: 2/4 📦 Install VCPKG dependencies
        run: |
          vcpkg install --triplet ${{ matrix.config.triplet }} --x-install-root "%VCPKG_INSTALLED_DIR%"

      # Force a save of the VCPKG packages, until the workflow goes fully green.
      - name: 💾 Save VCPKG cache
        if: ${{ always() && !cancelled() && steps.cache-vcpkg.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}\packages
            ~\AppData\Local\vcpkg\archives\
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}

      - name: 3/4 🧩 Configure non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake ^
            -S dependencies ^
            -B "%DEPS_DIR%\build" ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DFIFE_DEPENDENCIES_ROOT="%DEPS_DIR%" ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} ^
            -DVCPKG_INSTALLED_DIR="%VCPKG_INSTALLED_DIR%" ^
            -DFIFECHAN_BUILD_FROM_SOURCE=ON

      - name: 3/4 🏗️ Build non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake --build "%DEPS_DIR%\build" --parallel

      # Notes:
      # - SWIG: the detection uses the CMake FindSWIG module, which looks for SWIG_EXECUTABLE and SWIG_DIR.
      #   It will find the pre-installed SWIG in C:/ProgramData/chocolatey/lib/swig/ first.
      #   We need to override it to use the one we fetched.
      #   If SWIG_EXECUTABLE is not set, the system one will be used (C:/ProgramData/chocolatey/lib/swig/)
      #   If SWIG_DIR is not set, SWIG_LIB will be the system one (C:/ProgramData/chocolatey/lib/swig/tools/install/swigwin-4.3.1/Lib)
      - name: 4/4 🛠️ Configure fifengine
        run: |
          cmake ^
            --preset ${{ matrix.config.preset }} ^
            -B "%BUILD_DIR%" ^
            -Dfifechan=ON ^
            -Dbuild-python=ON ^
            -Dbuild-library=ON ^
            -DCMAKE_PREFIX_PATH="%DEPS_DIR%\install;%VCPKG_INSTALLED_DIR%\${{ matrix.config.triplet }}" ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} ^
            -DVCPKG_INSTALLED_DIR="%VCPKG_INSTALLED_DIR%" ^
            -DSWIG_EXECUTABLE="%DEPS_DIR%\build-tools\swig\swig.exe" ^
            -DSWIG_DIR="%DEPS_DIR%\build-tools\swig\Lib"

      - name: 4/4 🙏 Build fifengine
        run: cmake --build ${{ env.BUILD_DIR }}

      - name: 4/4 📦 Install fifengine
        run: cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_DIR }}

      - name: ❔ CHECK important folders, to see if everything is present (after building)
        run: |
          dir ${{ env.BUILD_DIR }}
          dir ${{ env.INSTALL_DIR }}

      - name: 🔼 Upload build artifacts
        uses: actions/upload-artifact@v6 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
          retention-days: 30

# ---------------------------------------------------------------------------------------

  build-on-container:

# ---------------------------------------------------------------------------------------

    name: ${{ matrix.config.job_name }}

    runs-on: ubuntu-latest
    container: ghcr.io/jakoch/cpp-devbox:${{ matrix.config.image_version }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              job_name: "Linux | Clang20 | Release",
              image_version: "bookworm-latest",
              preset: "clang20-x64-linux-rel",
              artifact-name: "libfife-clang20-x64-linux"
            }
          - {
              job_name: "Linux | Clang21 | Release",
              image_version: "trixie-latest",
              preset: "clang21-x64-linux-rel",
              artifact-name: "libfife-clang21-x64-linux"
            }

    env:
      VCPKG_DISABLE_METRICS: 1
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      VCPKG_FEATURE_FLAGS: manifests,versions,binarycaching,registries
      SOURCE_DIR: ${{ github.workspace }}
      VCPKG_ROOT: /opt/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      DEPS_DIR: ${{ github.workspace }}/out/fife-dependencies

    defaults:
      run:
        shell: bash

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      # - libxcrypt depends on ltdl development files from the system package manager
      # - python3-dev is required for the python bindings
      - name: 🔽 Install System Dependencies
        run: |
          apt-get update -qq
          apt-get install -y \
            libglu1-mesa-dev \
            libfreetype6-dev \
            libxmu-dev \
            libxi-dev \
            libgl-dev \
            libltdl-dev \
            python3 \
            python3-dev

      - name: ✏ Define Build Paths
        run: |
          echo "BUILD_DIR=out/build/${{ matrix.config.preset }}" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=out/install/${{ matrix.config.preset }}" >> "$GITHUB_ENV"

      - name: 🎯 Setup Package Cache (vcpkg)
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/packages
            ~/.cache/vcpkg/archives
          key: cache-vcpkg-container-${{ matrix.config.preset }}-${{ github.ref }}
          restore-keys: |
            cache-vcpkg-container-${{ matrix.config.preset }}-${{ github.ref }}
            cache-vcpkg-container-${{ matrix.config.preset }}

      #- name: 🔽 Clone VCPKG (if missing)
      #  run: |
      #    if [[ ! -d "${VCPKG_ROOT}" ]]; then
      #      git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
      #    fi

      - name: 🔽 Update VCPKG (latest TAG)
        #if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          cd "${VCPKG_ROOT}"
          git fetch --tags --force

          if [[ -n "$(git status --porcelain)" ]]; then
            git stash push --include-untracked --message "ci-temp-before-tag-checkout"
          fi

          LATEST_VCPKG_TAG="$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags | head -n 1)"
          if [[ -z "${LATEST_VCPKG_TAG}" ]]; then
            echo "Failed to resolve latest vcpkg tag" >&2
            exit 1
          fi

          git checkout "${LATEST_VCPKG_TAG}"

      - name: 🛠️ Setup VCPKG
        #if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh"
          "${VCPKG_ROOT}/vcpkg" integrate install

      - name: 📦 Install VCPKG dependencies
        run: |
          "${VCPKG_ROOT}/vcpkg" install --triplet x64-linux --x-install-root="${{ env.VCPKG_INSTALLED_DIR }}"

      - name: 💾 Save VCPKG cache
        if: ${{ always() && !cancelled() && steps.cache-vcpkg.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/packages
            ~/.cache/vcpkg/archives
          key: cache-vcpkg-container-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}

      - name: 1/4 🧩 Configure non-vcpkg dependencies
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          cmake \
            -S dependencies \
            -B ${{ env.DEPS_DIR }}/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFIFE_DEPENDENCIES_ROOT=${{ env.DEPS_DIR }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}

      - name: 1/4 🏗️ Build non-vcpkg dependencies
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          cmake --build ${{ env.DEPS_DIR }}/build --parallel

      - name: 2/4 🛠️ CMake ➔ Configure (Preset)
        run: |
          export PATH="${{ env.DEPS_DIR }}/build-tools/swig/bin:$PATH"
          cmake --preset "${{ matrix.config.preset }}" \
            -DCMAKE_PREFIX_PATH="${{ env.DEPS_DIR }}/install;${{ env.VCPKG_INSTALLED_DIR }}/x64-linux"

      - name: 3/4 🙏 CMake ➔ Build
        run: |
          cmake --build "${BUILD_DIR}"

      - name: 4/4 📦 CMake ➔ Install
        run: |
          cmake --install "${BUILD_DIR}" \
            --prefix "${INSTALL_DIR}" \
            --verbose

      - name: 🧪 CTest ➔ Run Tests
        run: |
          ctest \
            --test-dir "${BUILD_DIR}" \
            --output-on-failure

      - name: ❔ CHECK folders, to see if everything is present (after building)
        run: |
          find "${INSTALL_DIR}" -type f | sort

      - name: 🔼 Upload Build Artifact
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact
        if: always()
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
