name: Build FIFEngine

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

# Improve CI concurrency by automatically cancelling outdated jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: clang20-x64-linux-rel
            triplet: x64-linux
            artifact-name: libfife-linux-x64
          - os: windows-latest
            preset: vc17-x64-windows-rel
            triplet: x64-windows
            artifact-name: libfife-windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (for vcpkg.sh)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglu1-mesa-dev autoconf libtool python3-jinja2 autoconf-archive automake libxmu-dev libxi-dev libgl-dev

      - name: Set up vcpkg
        uses: microsoft/setup-vcpkg@v1
        with:
          vcpkg-version: latest
          vcpkg-triplet: ${{ matrix.triplet }}

      - name: Install dependencies via vcpkg
        run: vcpkg install --triplet ${{ matrix.triplet }}

      - name: Configure CMake
        run: |
          cmake --preset ${{ matrix.preset }} -Dfifechan=OFF -Dbuild-python=OFF -Dbuild-library=ON

      - name: Build
        run: cmake --build out/build/${{ matrix.preset }}

      - name: Install
        run: cmake --install out/build/${{ matrix.preset }}

      - name: Verify build output
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            ls -la out/install/${{ matrix.preset }}/lib/libfife.so*
          else
            dir out\install\${{ matrix.preset }}\lib\libfife.*
          fi
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: out/install/${{ matrix.preset }}/**
          retention-days: 30
