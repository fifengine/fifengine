# -----------------------------------------------------------------------------
# This workflow builds the Fifengine C++ library on Linux.
#
# The "build-on-linux" job runs on GitHub-hosted runners.
# The "build-on-container" job runs in the Docker devcontainer environment.
# -----------------------------------------------------------------------------
name: Build on Linux (C++ Library)

on:
  - push
  - pull_request
  # You can manually run this workflow.
  - workflow_dispatch

# improve CI concurrency by automatically cancelling outdated jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

# ---------------------------------------------------------------------------------------

  build-on-linux:

# ---------------------------------------------------------------------------------------

    name: "${{ matrix.config.job_name }}"

    # https://github.com/actions/runner-images#available-environments
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
        # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
        - {
            job_name: "Linux | Clang 16 | Release",
            os: ubuntu-24.04,
            preset: clang16-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-clang16-x64-linux
          }
        - {
            job_name: "Linux | Clang 18 | Release",
            os: ubuntu-24.04,
            preset: clang18-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-clang18-x64-linux
          }
        - {
            job_name: "Linux | GCC 14 | Release",
            os: ubuntu-24.04,
            preset: gcc14-x64-linux-rel,
            triplet: x64-linux,
            artifact-name: libfife-gcc14-x64-linux
          }

    env:
      # VCPKG Settings
      VCPKG_DISABLE_METRICS: 1
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      VCPKG_FEATURE_FLAGS: manifests,versions,binarycaching,registries
      VCPKG_ROOT: /usr/local/share/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      # Paths
      SOURCE_DIR:  ${{ github.workspace }}
      BUILD_DIR:   ${{ github.workspace }}/build
      INSTALL_DIR: ${{ github.workspace }}/install
      # Path to non-vcpkg dependencies
      DEPS_DIR:    ${{ github.workspace }}/out/fife-dependencies

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      - name: 🔽 Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            software-properties-common \
            ninja-build \
            cmake \
            jq \
            wget \
            git \
            pkg-config

      - name: Get latest CMake and Ninja
        uses: lukka/get-cmake@latest # https://github.com/lukka/get-cmake
        with:
          cmakeVersion: latest
          ninjaVersion: latest

      - name: ℹ Show Tool Versions
        run: |
          cmake --version
          ninja --version

      - name: 🔽 Install required system packages (for vcpkg packages, e.g. SDL3)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake libtool \
            build-essential git make \
            pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
            libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev \
            libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev libxft-dev \
            libglu1-mesa-dev alsa-topology-conf

      # Reminder: This step requires that the CMakePresets for CI contain
      # "CMAKE_CXX_COMPILER_LAUNCHER": "sccache".
      - name: 🎯 Setup Build Cache
        uses: hendrikmuhs/ccache-action@v1.2.23 # https://github.com/hendrikmuhs/ccache-action
        with:
          key: build-${{ matrix.config.preset }}-${{ github.ref }}
          restore-keys: |
            build-${{ matrix.config.preset }}-${{ github.ref }}
            build-${{ matrix.config.preset }}

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          # https://github.com/microsoft/vcpkg/blob/master/docs/users/binarycaching.md#configuration
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}/packages
            /home/runner/.cache/vcpkg/archives/
          key: cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cache-vcpkg-${{ matrix.config.preset }}-${{ github.ref }}
            cache-vcpkg-${{ matrix.config.preset }}

      - name: 🎯 Setup Dependencies Cache
        id: cache-deps
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}
          restore-keys: |
            cache-deps-${{ matrix.config.preset }}-${{ github.ref }}
            cache-deps-${{ matrix.config.preset }}

      - name: 🔽 1.1 Update VCPKG (latest TAG)
        run: |
          cd ${{ env.VCPKG_ROOT }}
          git fetch origin --tags --force
          git checkout master
          git reset --hard origin/master
          git clean -fdx
          LATEST_VCPKG_TAG="$(git tag --sort=-v:refname | head -n 1)"
          git checkout "$LATEST_VCPKG_TAG"

      - name: 🛠️ 1.2 Setup VCPKG
        run: |
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh"
          "${VCPKG_ROOT}/vcpkg" integrate install

      - name: 📦 1.3 Install VCPKG dependencies
        #if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          "${{ env.VCPKG_ROOT }}/vcpkg" install --triplet "${{ matrix.config.triplet }}" --x-install-root="${{ env.VCPKG_INSTALLED_DIR }}"

      - name: ❔ CHECK important folders, to see if everything is present (after vcpkg install)
        run: |
          ls -lahr "${{ env.VCPKG_ROOT }}" || true
          ls -lahr "${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}/" || true
          ls -lahr "${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}/include" || true

      - name: 🧩 2.1 Configure non-vcpkg dependencies
        #if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake \
            -S dependencies \
            -B ${{ env.DEPS_DIR }}/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFIFE_DEPENDENCIES_ROOT=${{ env.DEPS_DIR }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }} \
            -DFIFEGUI_DEPENDENCY_BUILD_FROM_SOURCE=ON

      - name: 🏗️ 2.2 Build non-vcpkg dependencies
        #if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake --build ${{ env.DEPS_DIR }}/build --parallel

      - name: 🛠️ 3.1 Configure fifengine
        run: |
          cmake \
            --preset ${{ matrix.config.preset }} \
            -B ${{ env.BUILD_DIR }} \
            -DENABLE_FIFEGUI=ON \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_LIBRARY=ON \
            -DCMAKE_PREFIX_PATH="${{ env.DEPS_DIR }}/install;${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}" \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_MANIFEST_MODE=OFF \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}

      - name: 🙏 3.2 Build fifengine
        run: cmake --build ${{ env.BUILD_DIR }}

      - name: 📦 3.3 Install fifengine
        run: cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_DIR }}

      - name: ❔ CHECK important folders, to see if everything is present (after building)
        run: |
          ls -lahr ${{ env.BUILD_DIR }}
          ls -lahr ${{ env.INSTALL_DIR }}

      - name: 🔼 Upload build artifacts
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
          retention-days: 30

# ---------------------------------------------------------------------------------------

  build-on-container:

# ---------------------------------------------------------------------------------------

    name: ${{ matrix.config.job_name }}

    # Note on "image_version":
    # - The image versions are based on tags of the https://github.com/jakoch/cpp-devbox repo.
    # - Use rolling tags (e.g., "trixie-latest") for bleeding-edge updates,
    #   but expect potential instability due to changes in the included software.
    # - Pin to a fixed version (e.g., "trixie-20260329") for reproducible and stable builds.
    runs-on: ubuntu-latest
    container: ghcr.io/jakoch/cpp-devbox:${{ matrix.config.image_version }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              job_name: "Linux | Clang20 | Release",
              image_version: "bookworm-latest",
              preset: "clang20-x64-linux-rel",
              triplet: x64-linux,
              artifact-name: "libfife-clang20-x64-linux"
            }
          - {
              job_name: "Linux | Clang22 | Release",
              image_version: "trixie-latest",
              preset: "clang22-x64-linux-rel",
              triplet: x64-linux,
              artifact-name: "libfife-clang22-x64-linux"
            }

    env:
      # VCPKG Settings
      VCPKG_DISABLE_METRICS: 1
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      VCPKG_FEATURE_FLAGS: manifests,versions,binarycaching,registries
      # vcpkg is pre-installed at /opt/vcpkg in the devcontainer images.
      VCPKG_ROOT: /opt/vcpkg
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      # Paths
      SOURCE_DIR:  ${{ github.workspace }}
      BUILD_DIR:   ${{ github.workspace }}/build
      INSTALL_DIR: ${{ github.workspace }}/install
      # Path to non-vcpkg dependencies
      DEPS_DIR:    ${{ github.workspace }}/out/fife-dependencies

    defaults:
      run:
        shell: bash

    steps:
      - name: 🤘 Checkout Code
        uses: actions/checkout@v6 # https://github.com/actions/checkout

      - name: ℹ Show Tool Versions
        run: |
          cmake --version
          ninja --version

      - name: 🔽 Install required system packages (for vcpkg packages, e.g. SDL3)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf-archive automake libtool \
            build-essential git make \
            pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
            libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev \
            libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev libxft-dev \
            libglu1-mesa-dev alsa-topology-conf

      # Derive build/install directories directly from the preset name.
      - name: ✏ Define Build Paths
        run: |
          echo "BUILD_DIR=out/build/${{ matrix.config.preset }}" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=out/install/${{ matrix.config.preset }}" >> "$GITHUB_ENV"

      - name: 🎯 Setup VCPKG Cache
        id: cache-vcpkg
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          # https://github.com/microsoft/vcpkg/blob/master/docs/users/binarycaching.md#configuration
          path: |
            ${{ env.VCPKG_INSTALLED_DIR }}
            ${{ env.VCPKG_ROOT }}/packages
            ~/.cache/vcpkg/archives
          key: cache-vcpkg-container-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cache-vcpkg-container-${{ matrix.config.preset }}-${{ github.ref }}
            cache-vcpkg-container-${{ matrix.config.preset }}

      - name: 🎯 Setup Dependencies Cache
        id: cache-deps
        uses: actions/cache@v5 # https://github.com/actions/cache
        with:
          path: |
            ${{ env.DEPS_DIR }}
          key: cache-deps--container-${{ matrix.config.preset }}-${{ github.ref }}-${{ hashFiles('dependencies/CMakeLists.txt', 'cmake/get-fifechan.cmake', 'cmake/get-swig.cmake') }}
          restore-keys: |
            cache-deps--container-${{ matrix.config.preset }}-${{ github.ref }}
            cache-deps--container-${{ matrix.config.preset }}

      - name: 🔽 1.1 Update VCPKG (latest TAG)
        run: |
          cd ${{ env.VCPKG_ROOT }}
          git fetch origin --tags --force
          git checkout master
          git reset --hard origin/master
          git clean -fdx
          LATEST_VCPKG_TAG="$(git tag --sort=-v:refname | head -n 1)"
          git checkout "$LATEST_VCPKG_TAG"

      - name: 🛠️ 1.2 Setup VCPKG
        run: |
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh"
          "${VCPKG_ROOT}/vcpkg" integrate install

      - name: 📦 1.3 Install VCPKG dependencies
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          "${VCPKG_ROOT}/vcpkg" install --triplet "${{ matrix.config.triplet }}" --x-install-root="${{ env.VCPKG_INSTALLED_DIR }}"

      - name: ❔ CHECK important folders, to see if everything is present (after vcpkg install)
        run: |
          ls -lahr "${{ env.VCPKG_ROOT }}" || true
          ls -lahr "${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}/" || true
          ls -lahr "${{ env.VCPKG_INSTALLED_DIR }}/${{ matrix.config.triplet }}/include" || true

      - name: 🧩 2.1 Configure non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake \
            -S dependencies \
            -B ${{ env.DEPS_DIR }}/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFIFE_DEPENDENCIES_ROOT=${{ env.DEPS_DIR }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }} \
            -DFIFEGUI_DEPENDENCY_BUILD_FROM_SOURCE=ON

      - name: 🏗️ 2.2 Build non-vcpkg dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          cmake --build ${{ env.DEPS_DIR }}/build --parallel

      - name: 🛠️ 3.1 Configure fifengine
        run: |
          export PATH="${{ env.DEPS_DIR }}/build-tools/swig/bin:$PATH"
          cmake \
            --preset "${{ matrix.config.preset }}" \
            -B ${{ env.BUILD_DIR }} \
            -DENABLE_FIFEGUI=ON \
            -DBUILD_PYTHON_BINDINGS=OFF \
            -DBUILD_LIBRARY=ON \
            -DVCPKG_MANIFEST_MODE=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.DEPS_DIR }}/install;${{ env.VCPKG_INSTALLED_DIR }}/x64-linux" \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }} \
            -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}  \

      - name: 🙏 3.2 Build fifengine
        run: cmake --build ${{ env.BUILD_DIR }}

      - name: 📦 3.3 Install fifengine
        run: cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_DIR }} --verbose

      - name: 🧪 CTest ➔ Run Tests
        run: |
          ctest \
            --test-dir "${BUILD_DIR}" \
            --output-on-failure

      - name: ❔ CHECK folders, to see if everything is present (after building)
        run: |
          find "${{ env.INSTALL_DIR }}" -type f | sort

      - name: 🔼 Upload Build Artifact
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact
        if: always()
        with:
          name: ${{ matrix.config.artifact-name }}
          path: ${{ env.INSTALL_DIR }}/**/*
