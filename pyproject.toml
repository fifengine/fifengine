# ---------------------------------------------------------------------
# Project
# ---------------------------------------------------------------------

[project]
name = "libfife"
version = "0.4.2"
description = "FIFE library"
requires-python = ">=3.11"
dependencies = []
authors = [
  { name = "Fifengine contributors" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: GNU Lesser General Public License v2 or later (LGPLv2+)",
  "Operating System :: OS Independent",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: C++",
]

[project.urls]
Homepage = "https://www.fifengine.net"
Repository = "https://github.com/fifengine/fifengine"
Source = "https://github.com/fifengine/fifengine"
Changelog = "https://github.com/fifengine/fifengine/blob/master/CHANGELOG.md"
Documentation = "https://docs.fifengine.net/"
Tracker = "https://github.com/fifengine/fifengine/issues"

[project.optional-dependencies]
dev = ["pytest"]

# ---------------------------------------------------------------------
# Build System
# ---------------------------------------------------------------------
#   External dependencies (not bundled by default):
#     libfifechan_sdl2.so, libfifechan_opengl.so, SDL2, OpenAL, etc.
#   Bundling external deps into the wheel (for redistributable wheels):
#     auditwheel (Linux)
#     delocate (macOS)
#     delvewheel (Windows)
#     These can copy those .so/.dylib/.dll into the wheel and patch load paths.
#     This is done during CI via cibuildwheel as a post-build step of the wheel.

[build-system]
requires = [
    "scikit-build-core",
    "cmake",
    "ninja",
    "packaging"
]
build-backend = "scikit_build_core.build"

# We need to pass in CMAKE_TOOLCHAIN_FILE for VCPKG.
[tool.scikit-build]
build.verbose = true
cmake.build-type = "Release"
cmake.args = ["-DVCPKG_TARGET_TRIPLET=x64-linux"]

[tool.scikit-build.wheel.packages]
fife = "src/python/fife"

# ---------------------------------------------------------------------
# cibuildwheel
# ---------------------------------------------------------------------

# maybe build = "cp{311,312,313,314}-manylinux_x86_64"

[tool.cibuildwheel]
archs = ["x86_64"]
build = "cp{311}-manylinux_x86_64"
skip = "pp* *-musllinux_*"

[tool.cibuildwheel.linux]
manylinux-x86_64-image = "manylinux_2_28"

# ---------------------------------------------------------------------
# Check wheel contents
# ---------------------------------------------------------------------

#[tool.check-wheel-contents]
#toplevel = ["fife"]

# ---------------------------------------------------------------------
# Additional Python Tools
# ---------------------------------------------------------------------

[tool.black]
line-length = 90
target-version = ["py311"]
extend-exclude = "^(build|out|vcpkg_installed|engine/swigwrappers)/"

[tool.ruff]
line-length = 90
target-version = "py311"
extend-exclude = ["build", "out", "vcpkg_installed", "engine/swigwrappers"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"*.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
files = ["src/python/fife"]
ignore_missing_imports = true
show_error_codes = true
exclude = "^(tests|build|out|vcpkg_installed)/"
