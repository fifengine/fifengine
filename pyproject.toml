[tool.black]
line-length = 90
target-version = ["py310"]
extend-exclude = "^(build|out|vcpkg_installed|engine/swigwrappers)/"

[tool.ruff]
line-length = 90
target-version = "py310"
extend-exclude = ["build", "out", "vcpkg_installed", "engine/swigwrappers"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"tests/swig_tests/*.py" = ["F403", "F405"]
"tests/extension_tests/*.py" = ["F403", "F405"]

[tool.mypy]
python_version = "3.10"
files = ["src/python/fife"]
ignore_missing_imports = true
show_error_codes = true
exclude = "^(tests|build|out|vcpkg_installed)/"
